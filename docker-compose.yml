name: cart-api

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cart_user:cart_password@db:5432/cart?serverVersion=17&charset=utf8

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: cart
      POSTGRES_USER: cart_user
      POSTGRES_PASSWORD: cart_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cart_user -d cart"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
